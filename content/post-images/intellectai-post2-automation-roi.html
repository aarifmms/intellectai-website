<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; display: flex; flex-direction: column; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; padding: 50px 60px; }
.top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
.badge { background: #F59E0B; color: #000; font-size: 13px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 8px 16px; }
.url { color: #555; font-size: 15px; font-weight: 600; }
.headline { color: #fff; font-size: 38px; font-weight: 800; line-height: 1.2; margin-bottom: 40px; }
.headline span { color: #F59E0B; }
.comparison { display: flex; gap: 24px; flex: 1; }
.box { flex: 1; border-radius: 16px; padding: 32px 28px; display: flex; flex-direction: column; justify-content: center; }
.box-old { background: #1a1a1a; border: 2px solid #333; }
.box-new { background: linear-gradient(135deg, #F59E0B, #D97706); }
.box-label { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
.box-old .box-label { color: #666; }
.box-new .box-label { color: rgba(0,0,0,0.5); }
.box-price { font-size: 48px; font-weight: 900; margin-bottom: 8px; }
.box-old .box-price { color: #EF4444; }
.box-new .box-price { color: #000; }
.box-detail { font-size: 18px; line-height: 1.5; }
.box-old .box-detail { color: #888; }
.box-new .box-detail { color: rgba(0,0,0,0.7); }
.box-freq { font-size: 15px; margin-top: 8px; font-weight: 600; }
.box-old .box-freq { color: #EF4444; }
.box-new .box-freq { color: rgba(0,0,0,0.5); }
.arrow { display: flex; align-items: center; justify-content: center; font-size: 36px; color: #F59E0B; font-weight: 900; }
</style>
</head>
<body>
<div class="top">
  <div class="badge">IntellectAI</div>
  <div class="url">intellectai.com</div>
</div>
<div class="headline">The ROI Math Is <span>Simple</span></div>
<div class="comparison">
  <div class="box box-old">
    <div class="box-label">3 Virtual Assistants</div>
    <div class="box-price">$7,200</div>
    <div class="box-detail">Data entry + emails + reports</div>
    <div class="box-freq">Every single month. Forever.</div>
  </div>
  <div class="arrow">→</div>
  <div class="box box-new">
    <div class="box-label">AI Automation</div>
    <div class="box-price">$3,000</div>
    <div class="box-detail">All three tasks. Handled.</div>
    <div class="box-freq">One-time. Runs forever.</div>
  </div>
</div>
</body>
</html>
