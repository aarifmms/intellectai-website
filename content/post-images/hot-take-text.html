<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #222; font-family: 'Inter', sans-serif; }

  .card {
    width: 1080px; height: 1080px;
    background: #000;
    display: flex; flex-direction: column; justify-content: center;
    padding: 100px;
  }

  .main-text {
    font-size: 58px; font-weight: 900; color: #fff;
    line-height: 1.2; margin-bottom: 50px;
  }
  .main-text .dim { color: rgba(255,255,255,0.2); }

  .bottom {
    display: flex; align-items: center; gap: 14px;
  }
  .logo-box {
    width: 46px; height: 46px;
    background: #F59E0B;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; color: #000;
  }
  .name { font-size: 20px; font-weight: 800; color: rgba(255,255,255,0.4); }
</style>
</head>
<body>
  <div class="card">
    <div class="main-text">
      90% of "AI agencies" <span class="dim">are just people with ChatGPT subscriptions writing blog posts.</span>
    </div>
    <div class="bottom">
      <div class="logo-box">iA</div>
      <div class="name">IntellectAI</div>
    </div>
  </div>
</body>
</html>
