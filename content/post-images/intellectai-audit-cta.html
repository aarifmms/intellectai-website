<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #222; font-family: 'Inter', sans-serif; }

  .card {
    width: 1080px; height: 1080px;
    background: #F59E0B;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 80px;
  }

  .logo-box {
    width: 120px; height: 120px;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    font-size: 52px; font-weight: 900; color: #F59E0B;
    margin-bottom: 50px;
  }

  .main-text {
    font-size: 64px; font-weight: 900; color: #000;
    line-height: 1.1; margin-bottom: 20px;
  }

  .sub-text {
    font-size: 28px; font-weight: 700; color: rgba(0,0,0,0.5);
    margin-bottom: 50px;
  }

  .cta {
    background: #000; color: #F59E0B;
    font-size: 28px; font-weight: 900;
    padding: 20px 50px;
    letter-spacing: 1px;
  }

  .note {
    margin-top: 20px;
    font-size: 18px; font-weight: 700; color: rgba(0,0,0,0.35);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-box">iA</div>
    <div class="main-text">Free AI<br>Automation Audit</div>
    <div class="sub-text">Find out where AI can save you<br>10+ hours a week</div>
    <div class="cta">DM "AI AUDIT"</div>
    <div class="note">Limited spots — first 10 this week</div>
  </div>
</body>
</html>
