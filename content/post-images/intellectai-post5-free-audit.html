<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; display: flex; flex-direction: column; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F59E0B; padding: 50px 60px; position: relative; }
.top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
.brand { font-size: 20px; font-weight: 800; color: #000; letter-spacing: 1px; }
.spots { background: #000; color: #F59E0B; font-size: 14px; font-weight: 800; padding: 8px 18px; border-radius: 20px; letter-spacing: 1px; }
.free-badge { display: inline-block; background: #000; color: #F59E0B; font-size: 56px; font-weight: 900; padding: 8px 28px; margin-bottom: 20px; letter-spacing: -1px; }
.headline { color: #000; font-size: 42px; font-weight: 800; line-height: 1.2; margin-bottom: 28px; }
.checklist { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.check-item { display: flex; align-items: center; gap: 14px; }
.check-icon { width: 28px; height: 28px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #F59E0B; font-size: 16px; font-weight: 900; flex-shrink: 0; }
.check-text { color: #000; font-size: 20px; font-weight: 600; }
.bottom { position: absolute; bottom: 40px; left: 60px; right: 60px; display: flex; justify-content: space-between; align-items: center; }
.cta { background: #000; color: #F59E0B; font-size: 18px; font-weight: 800; padding: 14px 32px; border-radius: 8px; letter-spacing: 0.5px; }
.email { color: rgba(0,0,0,0.5); font-size: 16px; font-weight: 600; }
</style>
</head>
<body>
<div class="top">
  <div class="brand">IntellectAI</div>
  <div class="spots">ONLY 10 SPOTS</div>
</div>
<div class="free-badge">FREE</div>
<div class="headline">AI Readiness Audit<br>For Your Business</div>
<div class="checklist">
  <div class="check-item">
    <div class="check-icon">✓</div>
    <div class="check-text">60-min deep-dive into your workflows</div>
  </div>
  <div class="check-item">
    <div class="check-icon">✓</div>
    <div class="check-text">Custom AI Opportunity Map ranked by ROI</div>
  </div>
  <div class="check-item">
    <div class="check-icon">✓</div>
    <div class="check-text">Implementation roadmap with cost estimates</div>
  </div>
  <div class="check-item">
    <div class="check-icon">✓</div>
    <div class="check-text">Specific recommendations for YOUR industry</div>
  </div>
</div>
<div class="bottom">
  <div class="cta">DM "AUDIT" to claim yours</div>
  <div class="email">intellectai.com</div>
</div>
</body>
</html>
