<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #222; font-family: 'Inter', sans-serif; }

  .card {
    width: 1200px; height: 630px;
    background: #F59E0B;
    display: flex; align-items: center; justify-content: center;
    gap: 40px; padding: 60px 80px;
  }

  .logo-box {
    width: 160px; height: 160px;
    background: #000;
    display: flex; align-items: center; justify-content: center;
    font-size: 72px; font-weight: 900; color: #F59E0B;
    flex-shrink: 0;
  }

  .text-side {}
  .brand-name {
    font-size: 72px; font-weight: 900; color: #000;
    line-height: 1;  margin-bottom: 12px;
  }
  .tagline {
    font-size: 28px; font-weight: 700; color: rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo-box">iA</div>
    <div class="text-side">
      <div class="brand-name">IntellectAI</div>
      <div class="tagline">Agentic AI Agency</div>
    </div>
  </div>
</body>
</html>
