<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; display: flex; flex-direction: column; justify-content: center; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; padding: 60px 70px; position: relative; }
.top-bar { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #F59E0B; }
.badge { display: inline-block; background: #EF4444; color: #fff; font-size: 14px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 8px 18px; margin-bottom: 32px; border-radius: 4px; }
.quote { color: #fff; font-size: 52px; font-weight: 800; line-height: 1.2; margin-bottom: 32px; }
.quote span { color: #F59E0B; }
.sub { color: #888; font-size: 22px; line-height: 1.5; max-width: 800px; }
.bottom { position: absolute; bottom: 40px; left: 70px; right: 70px; display: flex; justify-content: space-between; align-items: center; }
.brand-mark { display: flex; align-items: center; gap: 12px; }
.brand-dot { width: 12px; height: 12px; background: #F59E0B; border-radius: 50%; }
.brand-name { color: #fff; font-size: 18px; font-weight: 700; }
.url { color: #555; font-size: 15px; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="badge">Hot Take</div>
<div class="quote">90% of AI agencies<br>will be <span>dead</span><br>in 12 months.</div>
<div class="sub">They're all selling ChatGPT wrappers with a nice UI.<br>The survivors will build agentic systems.</div>
<div class="bottom">
  <div class="brand-mark">
    <div class="brand-dot"></div>
    <div class="brand-name">IntellectAI</div>
  </div>
  <div class="url">intellectai.com</div>
</div>
</body>
</html>
