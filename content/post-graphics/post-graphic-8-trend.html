<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #222; font-family: 'Inter', sans-serif; }

  .card {
    width: 1080px; height: 1080px;
    background: #1a1a1a;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 90px;
  }

  /* Big background word */
  .bg-word {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 220px; font-weight: 900; color: rgba(255,255,255,0.03);
    letter-spacing: -5px;
  }

  .top-label {
    font-size: 16px; font-weight: 900; color: #F59E0B;
    letter-spacing: 4px; margin-bottom: 50px;
  }

  .main-text {
    font-size: 62px; font-weight: 900; color: #fff;
    line-height: 1.1; margin-bottom: 15px;
  }

  .highlight-text {
    font-size: 62px; font-weight: 900; color: #F59E0B;
    line-height: 1.1; margin-bottom: 60px;
  }

  .versus {
    display: flex; flex-direction: column; gap: 24px;
    margin-bottom: 60px;
  }

  .vs-row {
    display: flex; align-items: center; justify-content: center; gap: 24px;
  }

  .vs-box {
    padding: 18px 35px; font-size: 26px; font-weight: 800;
    border-radius: 8px;
  }
  .vs-box.left { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); }
  .vs-box.right { color: #fff; }
  .vs-box.right.orange { background: #F59E0B; color: #000; }
  .vs-eq { font-size: 28px; color: rgba(255,255,255,0.2); font-weight: 900; }

  .closing {
    font-size: 28px; font-weight: 800; color: rgba(255,255,255,0.4);
  }
  .closing strong { color: #F59E0B; }

  .bottom-bar {
    position: absolute; bottom: 50px; left: 90px; right: 90px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .brand-box { display: flex; align-items: center; gap: 12px; }
  .brand-icon { background: #F59E0B; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; font-size: 19px; font-weight: 900; color: #000; }
  .brand-name { font-size: 20px; font-weight: 900; color: #fff; }
  .share { font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>
  <div class="card">
    <div class="bg-word">AGENTS</div>

    <div class="top-label">2026 INSIGHT</div>

    <div class="main-text">The agents aren't the moat.</div>
    <div class="highlight-text">The orchestration is.</div>

    <div class="versus">
      <div class="vs-row">
        <div class="vs-box left">A single AI agent</div>
        <div class="vs-eq">=</div>
        <div class="vs-box right">a tool</div>
      </div>
      <div class="vs-row">
        <div class="vs-box left">An orchestrated system</div>
        <div class="vs-eq">=</div>
        <div class="vs-box right orange">a team</div>
      </div>
    </div>

    <div class="closing">We build <strong>teams</strong> at IntellectAI.</div>

    <div class="bottom-bar">
      <div class="brand-box">
        <div class="brand-icon">iA</div>
        <div class="brand-name">IntellectAI</div>
      </div>
      <div class="share">share if you agree</div>
    </div>
  </div>
</body>
</html>
