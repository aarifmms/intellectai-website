<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #222; font-family: 'Inter', sans-serif; }

  .card {
    width: 1080px; height: 1080px;
    background: #0D9488;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 80px;
  }

  .top-label {
    position: absolute; top: 45px; left: 50px;
    background: #fff; color: #0D9488;
    font-size: 16px; font-weight: 900; padding: 10px 24px;
    letter-spacing: 3px;
  }

  .quote-mark {
    font-size: 180px; font-weight: 900; color: rgba(255,255,255,0.15);
    line-height: 0.6; margin-bottom: 20px;
  }

  .quote-text {
    font-size: 44px; font-weight: 900; color: #fff;
    line-height: 1.2; margin-bottom: 50px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
    max-width: 850px;
  }
  .quote-text .yellow { color: #FBBF24; }

  .comparison {
    display: flex; gap: 30px; margin-bottom: 45px; width: 100%;
  }

  .comp-box {
    flex: 1; padding: 35px; border-radius: 16px;
    text-align: center;
  }
  .comp-box.before { background: rgba(220,38,38,0.25); }
  .comp-box.after { background: rgba(255,255,255,0.2); }

  .comp-label { font-size: 14px; font-weight: 900; color: rgba(255,255,255,0.7); letter-spacing: 3px; margin-bottom: 10px; }
  .comp-number { font-size: 72px; font-weight: 900; color: #fff; line-height: 1; margin-bottom: 5px; }
  .comp-desc { font-size: 16px; color: rgba(255,255,255,0.6); font-weight: 700; }

  .tagline {
    font-size: 28px; font-weight: 800; color: rgba(255,255,255,0.7);
  }
  .tagline strong { color: #fff; }

  .bottom-bar {
    position: absolute; bottom: 50px; left: 80px; right: 80px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .brand-box { display: flex; align-items: center; gap: 12px; }
  .brand-icon { font-size: 28px; }
  .brand-name { font-size: 22px; font-weight: 900; color: #fff; }
  .cta { background: #fff; color: #0D9488; font-size: 16px; font-weight: 900; padding: 12px 28px; }
</style>
</head>
<body>
  <div class="card">
    <div class="top-label">CASE STUDY</div>

    <div class="quote-mark">"</div>
    <div class="quote-text">We went from <span class="yellow">15 hours/week</span> on compliance checks to <span class="yellow">15 minutes.</span></div>

    <div class="comparison">
      <div class="comp-box before">
        <div class="comp-label">BEFORE</div>
        <div class="comp-number">15 hrs</div>
        <div class="comp-desc">Manual checks weekly</div>
      </div>
      <div class="comp-box after">
        <div class="comp-label">AFTER</div>
        <div class="comp-number">15 min</div>
        <div class="comp-desc">AI-powered monitoring</div>
      </div>
    </div>

    <div class="tagline"><strong>Your account. Protected.</strong> On autopilot.</div>

    <div class="bottom-bar">
      <div class="brand-box">
        <div class="brand-icon">🛡️</div>
        <div class="brand-name">SellerPilotAI</div>
      </div>
      <div class="cta">TRY FREE →</div>
    </div>
  </div>
</body>
</html>
