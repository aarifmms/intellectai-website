<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #222; font-family: 'Inter', sans-serif; }

  .card {
    width: 1080px; height: 1080px;
    background: #1a1a2e;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 80px;
  }

  .quote-big {
    font-size: 280px; font-weight: 900; color: rgba(255,255,255,0.04);
    position: absolute; top: -40px; left: 40px; line-height: 1;
  }

  .top-label {
    font-size: 16px; font-weight: 900; color: #7C83DB;
    letter-spacing: 4px; margin-bottom: 50px;
  }

  .main-text {
    font-size: 64px; font-weight: 900; color: #fff;
    line-height: 1.15; margin-bottom: 25px;
  }
  .dim { color: rgba(255,255,255,0.25); }

  .highlight-text {
    font-size: 64px; font-weight: 900; color: #7C83DB;
    line-height: 1.15; margin-bottom: 50px;
  }

  .arrow-down {
    width: 60px; height: 60px; margin-bottom: 40px;
    border: 4px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; color: rgba(255,255,255,0.4);
  }

  .sub-text {
    font-size: 26px; font-weight: 700; color: rgba(255,255,255,0.5);
    line-height: 1.5;
  }
  .sub-text strong { color: #fff; }

  .bottom-bar {
    position: absolute; bottom: 50px; left: 80px; right: 80px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .brand-box { display: flex; align-items: center; gap: 14px; }
  .brand-icon { background: #F59E0B; width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; color: #000; }
  .brand-name { font-size: 22px; font-weight: 800; color: #fff; }
  .platform { font-size: 14px; font-weight: 800; color: rgba(255,255,255,0.2); letter-spacing: 2px; }
</style>
</head>
<body>
  <div class="card">
    <div class="quote-big">"</div>

    <div class="top-label">THOUGHT LEADERSHIP</div>

    <div class="main-text">Most businesses don't need<br><span class="dim">"AI transformation."</span></div>

    <div class="highlight-text">They need one automation<br>that saves 10 hours a week.</div>

    <div class="arrow-down">↓</div>

    <div class="sub-text"><strong>Start small.</strong> Automate what hurts.<br><strong>Scale what works.</strong></div>

    <div class="bottom-bar">
      <div class="brand-box">
        <div class="brand-icon">iA</div>
        <div class="brand-name">IntellectAI</div>
      </div>
      <div class="platform">LINKEDIN</div>
    </div>
  </div>
</body>
</html>
