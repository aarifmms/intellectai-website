<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #222; font-family: 'Inter', sans-serif; }

  .card {
    width: 1080px; height: 1080px;
    background: #DC2626;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 80px;
  }

  .top-label {
    position: absolute; top: 45px; left: 50%; transform: translateX(-50%);
    background: #fff; color: #DC2626;
    font-size: 18px; font-weight: 900; padding: 10px 28px;
    letter-spacing: 3px;
  }

  /* Fire icon */
  .fire-icon {
    font-size: 100px; margin-bottom: 30px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
  }

  .main-text {
    font-size: 58px; font-weight: 900; color: #fff;
    line-height: 1.1; margin-bottom: 15px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
  }

  .dim-text {
    font-size: 42px; font-weight: 800; color: rgba(255,255,255,0.5);
    line-height: 1.2; margin-bottom: 50px;
  }

  .separator {
    width: 100px; height: 4px; background: #fff; margin-bottom: 50px;
  }

  .checklist {
    display: flex; flex-direction: column; gap: 20px; text-align: left;
    width: 100%; max-width: 750px;
  }

  .check-item {
    font-size: 28px; font-weight: 800; color: #fff;
    display: flex; align-items: baseline; gap: 16px;
  }
  .check-item .dash { color: rgba(255,255,255,0.5); }
  .check-item .bold { color: #fff; }
  .check-item .light { color: rgba(255,255,255,0.6); font-weight: 700; }

  .bottom-bar {
    position: absolute; bottom: 50px; left: 80px; right: 80px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .brand-box { display: flex; align-items: center; gap: 12px; }
  .brand-icon { background: #fff; width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; color: #DC2626; border-radius: 0; }
  .brand-name { font-size: 22px; font-weight: 900; color: #fff; }
  .engage { font-size: 16px; font-weight: 700; color: rgba(255,255,255,0.6); }
</style>
</head>
<body>
  <div class="card">
    <div class="top-label">HOT TAKE</div>

    <div class="fire-icon">🔥</div>

    <div class="main-text">90% of "AI agencies"</div>
    <div class="dim-text">are just people with ChatGPT<br>writing blog posts.</div>

    <div class="separator"></div>

    <div class="checklist">
      <div class="check-item"><span class="dash">—</span> <span><span class="bold">Build custom agents</span> <span class="light">for YOUR workflows</span></span></div>
      <div class="check-item"><span class="dash">—</span> <span><span class="bold">Automate processes</span> <span class="light">that cost you money</span></span></div>
      <div class="check-item"><span class="dash">—</span> <span><span class="bold">Deliver measurable ROI</span> <span class="light">not vibes</span></span></div>
    </div>

    <div class="bottom-bar">
      <div class="brand-box">
        <div class="brand-icon">iA</div>
        <div class="brand-name">IntellectAI</div>
      </div>
      <div class="engage">agree? drop a 🔥</div>
    </div>
  </div>
</body>
</html>
