<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IntellectAI - Agentic AI Voice Agent</title>
  <style>
    @font-face {
      font-family: 'SystemSans';
      src: local('SF Pro Display'), local('Segoe UI'), local('Helvetica Neue'), local('Arial');
    }
    @font-face {
      font-family: 'SystemMono';
      src: local('SF Mono'), local('Consolas'), local('Monaco'), local('Courier New');
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: 'SystemSans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .fb-post {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0a0a1a 0%, #0d1b2a 50%, #1b263b 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 60px 80px;
    }

    /* Animated grid background */
    .grid-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(40px, 40px); }
    }

    /* Glowing orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.6;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.4) 0%, transparent 70%);
      top: -100px;
      right: 100px;
      animation: float1 8s ease-in-out infinite;
    }

    .orb-2 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(138, 43, 226, 0.3) 0%, transparent 70%);
      bottom: -50px;
      left: 200px;
      animation: float2 10s ease-in-out infinite;
    }

    .orb-3 {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(0, 255, 136, 0.25) 0%, transparent 70%);
      top: 50%;
      right: 30%;
      animation: float3 6s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-30px, 20px) scale(1.1); }
    }

    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, -30px) scale(0.9); }
    }

    @keyframes float3 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-20px, -20px); }
    }

    /* Left content */
    .content {
      position: relative;
      z-index: 10;
      max-width: 550px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 30px;
    }

    .logo-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
    }

    .logo-icon svg {
      width: 30px;
      height: 30px;
    }

    .logo-text {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(90deg, #ffffff 0%, #00d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-family: 'SystemMono', 'SF Mono', Consolas, monospace;
      font-size: 13px;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .headline {
      font-size: 52px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.1;
      margin-bottom: 25px;
      letter-spacing: -1px;
    }

    .headline span {
      background: linear-gradient(90deg, #00d4ff 0%, #00ff88 50%, #00d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .description {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
      margin-bottom: 35px;
      font-weight: 300;
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 36px;
      background: linear-gradient(135deg, #00d4ff 0%, #00ff88 100%);
      border-radius: 50px;
      color: #0a0a1a;
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 
        0 0 40px rgba(0, 212, 255, 0.4),
        0 10px 30px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .cta-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .cta-button svg {
      width: 20px;
      height: 20px;
    }

    /* Right side - Voice Agent Visualization */
    .voice-visual {
      position: relative;
      z-index: 10;
      width: 420px;
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Central AI Core */
    .ai-core {
      position: absolute;
      width: 140px;
      height: 140px;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.2) 0%, rgba(0, 255, 136, 0.1) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 
        0 0 60px rgba(0, 212, 255, 0.3),
        inset 0 0 40px rgba(0, 212, 255, 0.1);
      border: 2px solid rgba(0, 212, 255, 0.3);
    }

    .ai-core::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid rgba(0, 212, 255, 0.5);
      animation: corePulse 2s ease-in-out infinite;
    }

    @keyframes corePulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.15); opacity: 0.5; }
    }

    .ai-core svg {
      width: 60px;
      height: 60px;
      color: #00d4ff;
    }

    /* Sound waves */
    .sound-waves {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wave-ring {
      position: absolute;
      border: 2px solid rgba(0, 212, 255, 0.3);
      border-radius: 50%;
      animation: waveExpand 3s ease-out infinite;
    }

    .wave-ring:nth-child(1) { width: 180px; height: 180px; animation-delay: 0s; }
    .wave-ring:nth-child(2) { width: 240px; height: 240px; animation-delay: 0.5s; }
    .wave-ring:nth-child(3) { width: 300px; height: 300px; animation-delay: 1s; }
    .wave-ring:nth-child(4) { width: 360px; height: 360px; animation-delay: 1.5s; }

    @keyframes waveExpand {
      0% { transform: scale(0.8); opacity: 0.8; }
      100% { transform: scale(1.2); opacity: 0; }
    }

    /* Voice bars */
    .voice-bars {
      position: absolute;
      bottom: 80px;
      display: flex;
      gap: 6px;
      align-items: flex-end;
    }

    .bar {
      width: 8px;
      background: linear-gradient(180deg, #00d4ff 0%, #00ff88 100%);
      border-radius: 4px;
      animation: barPulse 1s ease-in-out infinite;
    }

    .bar:nth-child(1) { height: 30px; animation-delay: 0s; }
    .bar:nth-child(2) { height: 50px; animation-delay: 0.1s; }
    .bar:nth-child(3) { height: 70px; animation-delay: 0.2s; }
    .bar:nth-child(4) { height: 45px; animation-delay: 0.3s; }
    .bar:nth-child(5) { height: 60px; animation-delay: 0.4s; }
    .bar:nth-child(6) { height: 35px; animation-delay: 0.5s; }
    .bar:nth-child(7) { height: 55px; animation-delay: 0.6s; }

    @keyframes barPulse {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.5); }
    }

    /* Floating particles */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #00d4ff;
      border-radius: 50%;
      animation: particleFloat 4s linear infinite;
    }

    .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
    .particle:nth-child(2) { left: 80%; top: 30%; animation-delay: 1s; }
    .particle:nth-child(3) { left: 30%; top: 70%; animation-delay: 2s; }
    .particle:nth-child(4) { left: 70%; top: 80%; animation-delay: 0.5s; }
    .particle:nth-child(5) { left: 50%; top: 10%; animation-delay: 1.5s; }
    .particle:nth-child(6) { left: 20%; top: 50%; animation-delay: 2.5s; }

    @keyframes particleFloat {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translateY(-100px) scale(0); opacity: 0; }
    }

    /* Neural connections */
    .neural-lines {
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .neural-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.5), transparent);
      transform-origin: left center;
    }

    .neural-line:nth-child(1) { width: 120px; top: 30%; left: 20%; transform: rotate(25deg); }
    .neural-line:nth-child(2) { width: 80px; top: 60%; left: 15%; transform: rotate(-15deg); }
    .neural-line:nth-child(3) { width: 100px; top: 40%; right: 10%; transform: rotate(45deg); }
    .neural-line:nth-child(4) { width: 60px; bottom: 30%; right: 20%; transform: rotate(-30deg); }

    /* Corner accent */
    .corner-accent {
      position: absolute;
      bottom: 40px;
      right: 60px;
      font-family: 'SystemMono', 'SF Mono', Consolas, monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      text-align: right;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="fb-post">
    <!-- Background elements -->
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <!-- Left Content -->
    <div class="content">
      <div class="brand">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a1a" stroke-width="2.5">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <span class="logo-text">IntellectAI</span>
      </div>
      
      <div class="tagline">Next-Gen Conversational Intelligence</div>
      
      <h1 class="headline">
        <span>Agentic AI</span><br>
        Voice Agents
      </h1>
      
      <p class="description">
        Intelligent voice agents that understand, respond, and take action autonomously. Transform your customer experience with AI that truly converses.
      </p>
      
      <div class="cta-button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
        Reach Us for Demo
      </div>
    </div>

    <!-- Right Visual -->
    <div class="voice-visual">
      <div class="neural-lines">
        <div class="neural-line"></div>
        <div class="neural-line"></div>
        <div class="neural-line"></div>
        <div class="neural-line"></div>
      </div>

      <div class="sound-waves">
        <div class="wave-ring"></div>
        <div class="wave-ring"></div>
        <div class="wave-ring"></div>
        <div class="wave-ring"></div>
      </div>

      <div class="ai-core">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>

      <div class="voice-bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>

    <div class="corner-accent">
      POWERED BY<br>
      AGENTIC AI
    </div>
  </div>
</body>
</html>
